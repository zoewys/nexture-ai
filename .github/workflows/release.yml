name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    name: macOS package
    runs-on: macos-15
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm config set store-dir .pnpm-store
      - run: pnpm install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: pnpm run typecheck
      - run: node --test tests/app-update-release.test.mjs
      - run: pnpm run build
      - run: pnpm exec electron-builder --mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Windows package
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm config set store-dir .pnpm-store
      - run: pnpm install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: pnpm run typecheck
      - run: node --test tests/app-update-release.test.mjs
      - run: pnpm run build
      - run: pnpm exec electron-builder --win --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: GitHub release
    needs:
      - macos
      - windows
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        run: |
          find release-assets -type f -print
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated release for $GITHUB_REF_NAME." \
              --verify-tag
          fi
          find release-assets -type f -print0 | xargs -0 gh release upload "$GITHUB_REF_NAME" --clobber
