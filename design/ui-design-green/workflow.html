<!DOCTYPE html>
<html lang="zh-CN">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    /* ========================= DATA ========================= */
    const runs = [

    const steps = [

      { id: 's3', name: 'Refactor auth', status: 'idle', agent: 'claude-code' },

      { role: 'ai', text: '好的，我来为 /apps/api 实现 JWT 认证中间件。首先让我分析现有的代码结构...\n\n我已经分析了项目结构，发现已有 Express 框架但缺少认证层。我将按以下步骤进行：\n\n1. 安装依赖: jsonwebtoken, bcrypt\n2. 创建 middleware/auth.ts\n3. 实现 token 轮换策略\n4. 添加单元测试', time: '1m ago' },
      { role: 'ai', text: '```json\n{\n  "plan": [\n    "安装依赖",\n    "创建 auth middleware",\n    "实现 refresh token 轮换",\n    "编写测试"\n  ],\n  "currentStep": 1\n}\n```', time: '1m ago', artifact: { type: 'json', title: 'plan.json' } },

      { role: 'ai', text: '正在创建 auth middleware...\n\n```typescript\n// middleware/auth.ts\nimport { Request, Response, NextFunction } from \'express\';\nimport jwt from \'jsonwebtoken\';\n\nexport interface AuthRequest extends Request {\n  user?: { id: string; email: string };\n}\n\nexport const authenticate = (\n  req: AuthRequest,\n  res: Response,\n  next: NextFunction\n) => {\n  const token = req.headers.authorization?.split(\' \')[1];\n  if (!token) return res.status(401).json({ error: \'Unauthorized\' });\n  \n  try {\n    const decoded = jwt.verify(token, process.env.JWT_SECRET!) as any;\n    req.user = decoded;\n    next();\n  } catch (err) {\n    return res.status(403).json({ error: \'Invalid token\' });\n  }\n};\n```', time: '30s ago', artifact: { type: 'code', title: 'middleware/auth.ts' } },
    ];

    const schedules = [
      { id: 'sch-1', name: 'Daily health-check', cron: '0 9 * * *', enabled: true, lastRun: '今天 09:00' },
      { id: 'sch-2', name: 'Weekly dependency update', cron: '0 10 * * 1', enabled: true, lastRun: '周一 10:00' },
      { id: 'sch-3', name: 'Nightly e2e tests', cron: '0 2 * * *', enabled: false, lastRun: '昨天 02:00' },
    ];

    /* ========================= COMPONENTS ========================= */

    function ModeRail({ mode, onModeChange }) {
      const modes = [
        { key: 'workflow', icon: Icons.LayoutGrid, label: 'Workflow' },
        { key: 'templates', icon: Icons.Layers, label: 'Templates' },
        { key: 'agents', icon: Icons.Bot, label: 'Agents' },
        { key: 'single', icon: Icons.MessageCircle, label: 'Single' },
        { key: 'settings', icon: Icons.Settings, label: 'Settings' },
      ];
      return (
        <nav className="mode-rail">
          {modes.map(m => (
            <button
              key={m.key}
              className={`mode-rail-btn ${mode === m.key ? 'active' : ''}`}
              onClick={() => onModeChange(m.key)}
              title={m.label}
            >
              <m.icon />
            </button>
          ))}
        </nav>
      );
    }

    function StatusBadge({ status }) {
      const map = {
        running: 'run-status-running',
        success: 'run-status-success',
        error: 'run-status-error',
        'awaiting-confirm': 'run-status-awaiting',
        'awaiting-input': 'run-status-awaiting',
      };
      const labels = {
        running: '运行中',
        success: '已完成',
        error: '出错',
        'awaiting-confirm': '待确认',
        'awaiting-input': '待输入',
      };
      return <span className={`run-status-badge ${map[status] || ''}`}>{labels[status] || status}</span>;
    }

    function RunList({ runs, selectedRunId, onSelectRun, onNewRun }) {
      return (
        <div className="run-list">
          <button className="new-run-btn" onClick={onNewRun}>
            <Icons.Plus /> 新建工作流
          </button>
          {runs.map(run => (
            <div
              key={run.id}
              className={`run-item ${selectedRunId === run.id ? 'active' : ''}`}
              onClick={() => onSelectRun(run.id)}
            >
              <div className="run-item-header">
                <span className="run-name">{run.name}</span>
                <StatusBadge status={run.status} />
              </div>
              <div style={{ fontSize: 12, color: 'var(--neutral-text-secondary)' }}>
                步骤 {run.step} · {run.agent}
              </div>
              <div className="run-meta">
                <span><Icons.Clock size={10} /> {run.time}</span>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function ScheduleListView({ schedules, selectedScheduleId, onSelectSchedule }) {
      return (
        <div className="run-list">
          <button className="new-run-btn">
            <Icons.Plus /> 新建定时任务
          </button>
          {schedules.map(sch => (
            <div
              key={sch.id}
              className={`schedule-item ${selectedScheduleId === sch.id ? 'active' : ''}`}
              onClick={() => onSelectSchedule(sch.id)}
              style={{ cursor: 'pointer', borderColor: selectedScheduleId === sch.id ? 'rgba(61,142,134,0.35)' : undefined, background: selectedScheduleId === sch.id ? 'rgba(61,142,134,0.06)' : undefined }}
            >
              <div className="schedule-item-header">
                <span className="schedule-name">{sch.name}</span>
                <span className="run-status-badge" style={{ background: sch.enabled ? 'rgba(106,189,121,0.08)' : 'rgba(138,158,150,0.08)', color: sch.enabled ? 'var(--semantic-success)' : 'var(--neutral-text-muted)' }}>
                  {sch.enabled ? '启用' : '停用'}

              </div>
              <div className="schedule-cron">{sch.cron}</div>
              <div className="run-meta">上次运行: {sch.lastRun}</div>
            </div>
          ))}
        </div>
      );
    }

    function StepNavigator({ steps, selectedStepIndex, onSelectStep }) {
      return (
        <div className="step-nav">
          {steps.map((step, i) => (
            <button
              key={step.id}
              className={`step-pill ${step.status} ${selectedStepIndex === i ? 'active' : ''}`}
              onClick={() => onSelectStep(i)}
            >
              <span className={`step-indicator ${step.status}`} />
              {step.name}
            </button>
          ))}
        </div>
      );
    }

    function TranscriptViewer({ messages }) {
      return (
        <div className="transcript-area">
          {messages.map((msg, i) => (
            <div key={i} className={`message message-${msg.role}`}>
              <div className="message-meta">
                {msg.role === 'user' ? '用户' : '智能助手'} · {msg.time}
              </div>
              <div className="message-bubble">
                <div style={{ whiteSpace: 'pre-wrap' }}>{msg.text}</div>
                {msg.artifact && (
                  <div className="artifact-card">
                    <div className="artifact-header">
                      <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                        <Icons.FileCode /> {msg.artifact.title}
                      </span>
                      <span style={{ fontSize: 11, color: 'var(--neutral-text-muted)' }}>{msg.artifact.type}</span>
                    </div>
                    <div className="artifact-body">
                      <div className="code-block">{msg.text.split('```')[1] || msg.text}</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function ComposerBar({ value, onChange, onSend, placeholder, enabled }) {
      return (
        <div className="composer-bar">
          <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
            <span className="file-chip"><Icons.FileCode size={12} /> package.json <Icons.X size={12} style={{ cursor: 'pointer' }} /></span>
            <span className="file-chip"><Icons.FileCode size={12} /> tsconfig.json <Icons.X size={12} style={{ cursor: 'pointer' }} /></span>
          </div>
          <div className="composer-input-wrap">
            <button className="btn btn-ghost btn-sm" style={{ padding: 4 }}><Icons.Paperclip size={16} /></button>
            <textarea
              className="composer-textarea"
              rows={1}
              placeholder={placeholder}
              value={value}
              onChange={e => onChange(e.target.value)}
              disabled={!enabled}
            />
            <button className="btn btn-primary btn-sm" onClick={onSend} disabled={!enabled}>
              <Icons.Send size={14} />
            </button>
          </div>
        </div>
      );
    }

      return (
        <div className="handoff-panel">

          </div>

            <div style={{ fontSize: 13, color: 'var(--neutral-text-secondary)', marginBottom: 12 }}>
              上一步骤已完成，以下是传递给下一步的上下文：
            </div>
            <div className="code-block" style={{ fontSize: 12 }}>
{`{\n  "summary": "已完成 JWT middleware 骨架代码",\n  "files_modified": [\n    "src/middleware/auth.ts"\n  ],\n  "next_steps": [\n    "实现 refresh token 轮换逻辑",\n    "添加密码哈希比较"\n  ]\n}`}
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 14, justifyContent: 'flex-end' }}>
              <button className="btn btn-secondary btn-sm">查看完整 Handoff</button>
              <button className="btn btn-primary btn-sm"><Icons.Check size={14} /> 确认并继续</button>
            </div>
          </div>

    function RightPanel() {
      const [tab, setTab] = useState('files');
      return (
        <aside className="right-panel">
          <div className="right-panel-header">
            <span>文件预览</span>
            <div style={{ display: 'flex', gap: 4 }}>
              <button className={`detail-tab ${tab === 'files' ? 'active' : ''}`} onClick={() => setTab('files')} style={{ padding: '6px 10px' }}>文件</button>
              <button className={`detail-tab ${tab === 'output' ? 'active' : ''}`} onClick={() => setTab('output')} style={{ padding: '6px 10px' }}>输出</button>
            </div>
          </div>
          <div className="right-panel-body">
            {tab === 'files' && (
              <div>
                <div style={{ fontSize: 12, color: 'var(--neutral-text-muted)', marginBottom: 10, fontFamily: '"JetBrains Mono", monospace' }}>
                  src/middleware/auth.ts
                </div>
                <div className="code-block" style={{ fontSize: 12 }}>
{`import { Request, Response, NextFunction } from 'express';
import jwt from 'jsonwebtoken';

export interface AuthRequest extends Request {
  user?: { id: string; email: string };
}

export const authenticate = (
  req: AuthRequest,
  res: Response,
  next: NextFunction
) => {
  const token = req.headers.authorization?.split(' ')[1];
  if (!token) return res.status(401).json({ error: 'Unauthorized' });

  try {
    const decoded = jwt.verify(token, process.env.JWT_SECRET!) as any;
    req.user = decoded;
    next();
  } catch (err) {
    return res.status(403).json({ error: 'Invalid token' });
  }
};`}
                </div>
              </div>

+ jsonwebtoken@9.0.2
+ bcrypt@5.1.1
added 42 packages in 2.1s

$ mkdir -p src/middleware
$ cat > src/middleware/auth.ts << 'EOF'
...写入中
EOF

✓ 文件已创建`}
                </div>
              </div>
            )}
          </div>
        </aside>
      );
    }

              </div>
              <div className="form-group">
                <label className="form-label">运行名称</label>
                <input className="input" placeholder="例如 feature-auth-workflow" defaultValue="feature-auth-workflow" />
              </div>
              <div className="form-group">
                <label className="form-label">项目路径</label>
                <div style={{ display: 'flex', gap: 8 }}>
                  <input className="input" defaultValue="/Users/dev/projects/api-service" style={{ flex: 1 }} />
                  <button className="btn btn-secondary btn-sm"><Icons.FolderOpen size={14} /></button>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">初始指令</label>
                <textarea className="textarea" rows={5} defaultValue="请帮我实现一个基于 JWT 的认证中间件，要求支持 refresh token 轮换策略。" />
              </div>
              <div className="card" style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6, fontFamily: '"ZCOOL XiaoWei", serif' }}>
                  <Icons.GitBranch size={14} /> Git 安全检查
                </div>
                <div style={{ fontSize: 12, color: 'var(--neutral-text-secondary)', lineHeight: 1.8 }}>
                  ✓ 工作目录干净<br/>
                  ✓ 无冲突 worktree<br/>
                  ⚠ 当前有 1 个运行中任务
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">步骤预览</label>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {['分析代码结构', '生成测试', '重构认证', '更新文档', '最终审查'].map((s, i) => (
                    <div key={i} style={{ padding: '10px 14px', borderRadius: 10, border: '1px solid var(--glass-border)', background: 'var(--glass-bg)', backdropFilter: 'var(--glass-blur)', fontSize: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
                      <span style={{ width: 22, height: 22, borderRadius: '50%', background: 'var(--neutral-border-subtle)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700 }}>
                        {i + 1}
                      </span>
                      <span style={{ fontFamily: '"ZCOOL XiaoWei", serif' }}>{s}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="drawer-footer">
              <button className="btn btn-secondary" onClick={onClose}>取消</button>
              <button className="btn btn-primary"><Icons.Play size={14} /> 启动运行</button>
            </div>
          </div>
        </div>
      );
    }

    function ScheduleDetailView({ schedule }) {
      if (!schedule) return (
        <div className="empty-state">
          <Icons.Calendar size={32} className="empty-state-icon" />
          <div style={{ fontFamily: '"ZCOOL XiaoWei", serif' }}>选择一个定时任务查看详情</div>
        </div>
      );
      return (
        <div style={{ padding: 24 }}>
          <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 20, fontFamily: '"ZCOOL XiaoWei", serif', letterSpacing: 1 }}>
            {schedule.name}
          </div>
          <div className="card" style={{ marginBottom: 18 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
              <div>
                <div className="form-label">Cron 表达式</div>
                <div style={{ fontSize: 13, fontFamily: '"JetBrains Mono", monospace' }}>{schedule.cron}</div>
              </div>
              <div>
                <div className="form-label">状态</div>
                <div style={{ fontSize: 13 }}>{schedule.enabled ? '已启用' : '已停用'}</div>
              </div>
              <div>
                <div className="form-label">上次运行</div>
                <div style={{ fontSize: 13 }}>{schedule.lastRun}</div>
              </div>
              <div>
                <div className="form-label">下次运行</div>
                <div style={{ fontSize: 13 }}>明日 09:00</div>
              </div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            <button className="btn btn-danger btn-sm"><Icons.Trash2 size={14} /> 删除</button>
            <button className="btn btn-secondary btn-sm">编辑</button>
          </div>
        </div>
      );
    }

    function App() {
      const [theme, setTheme] = useState('light');
      const [mode, setMode] = useState('workflow');
      const [activeTab, setActiveTab] = useState('runs');
      const [selectedRunId, setSelectedRunId] = useState('run-1');
      const [selectedStepIndex, setSelectedStepIndex] = useState(1);
      const [selectedScheduleId, setSelectedScheduleId] = useState('sch-1');
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [composerValue, setComposerValue] = useState('');

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);

      const selectedRun = runs.find(r => r.id === selectedRunId);

      return (
        <div className="app">
          {/* 亮色：中国风底纹 + 水墨装饰 */}
          <div className="chinese-pattern-bg" />
          <div className="ink-wash ink-wash-1" />
          <div className="ink-wash ink-wash-2" />
          <BambooDecoration />

          {/* 暗色：科技感网格 + 光晕 */}
          <div className="tech-grid-bg" />
          <div className="tech-glow tech-glow-1" />
          <div className="tech-glow tech-glow-2" />

          {/* 主题切换 */}
          <button className="theme-toggle" onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')}>
            {theme === 'light' ? '暗色' : '亮色'}
          </button>

          <header className="app-header">
            <div className="app-brand">
              <h1>竹林工坊</h1>
              <span className="app-subtitle">{mode === 'workflow' ? '工作流' : mode}</span>
            </div>
            <div className="topbar-chips">
              <span className="topbar-chip">1 运行中</span>
              <span className="topbar-chip">1 待确认</span>
              <span className="topbar-chip">4 模板</span>
              <span className="topbar-chip">3 智能体</span>
            </div>
          </header>

          <div className="app-body">
            <ModeRail mode={mode} onModeChange={setMode} />

            <div className="workspace">
              <div className="workflow-sidebar-shell">
                <div className="workflow-tabs">
                  <button className={activeTab === 'runs' ? 'active' : ''} onClick={() => setActiveTab('runs')}>运行</button>
                  <button className={activeTab === 'schedules' ? 'active' : ''} onClick={() => setActiveTab('schedules')}>定时</button>
                </div>
                {activeTab === 'runs' ? (
                  <RunList
                    runs={runs}
                    selectedRunId={selectedRunId}
                    onSelectRun={setSelectedRunId}
                    onNewRun={() => setDrawerOpen(true)}
                  />
                ) : (
                  <ScheduleListView
                    schedules={schedules}
                    selectedScheduleId={selectedScheduleId}
                    onSelectSchedule={setSelectedScheduleId}
                  />
                )}
              </div>

              {activeTab === 'runs' ? (
                <div className="run-detail">
                  <div className="detail-header">
                    <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                      <div className="detail-title">{selectedRun?.name}</div>
                      <StatusBadge status={selectedRun?.status} />
                    </div>
                    <div className="detail-actions">
                      <button className="btn btn-secondary btn-sm"><Icons.RotateCcw size={14} /> 重试</button>
                      <button className="btn btn-secondary btn-sm"><Icons.SkipForward size={14} /> 跳过</button>
                      <button className="btn btn-danger btn-sm"><Icons.Square size={14} /> 终止</button>
                    </div>
                  </div>

                  <StepNavigator
                    steps={steps}
                    selectedStepIndex={selectedStepIndex}
                    onSelectStep={setSelectedStepIndex}
                  />

                  <div className="step-info">
                    <div className="step-info-row">
                      <span>智能体: <strong>codex</strong></span>
                      <span>模型: <strong>claude-sonnet-4-6</strong></span>
                      <span>状态: <strong style={{ color: 'var(--brand-primary)' }}>运行中</strong></span>
                      <span>耗时: <strong>1m 34s</strong></span>
                    </div>
                  </div>

                  <div className="detail-body">
                    <div className="detail-main">
                      <div style={{ padding: '14px 24px', borderBottom: '1px solid var(--glass-border)' }}>
                        <div className="status-banner running">
                          <Icons.Zap /> 当前步骤正在执行中 — 智能体正在处理任务...
                        </div>
                        <HandoffPanel />
                      </div>
                      <TranscriptViewer messages={transcripts} />
                      <ComposerBar
                        value={composerValue}
                        onChange={setComposerValue}
                        onSend={() => setComposerValue('')}
                        placeholder="向运行中的智能体发送消息..."
                        enabled={true}
                      />
                    </div>
                    <div className="resize-handle" />
                    <RightPanel />
                  </div>
                </div>
              ) : (
                <ScheduleDetailView schedule={schedules.find(s => s.id === selectedScheduleId)} />
              )}
            </div>
          </div>

          <NewRunDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
