<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Studio — UI 设计稿预览</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", monospace;
    font-size: 14px; line-height: 1.6; color: #1a2e2e; background: #f5f7f6;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border: 1px solid #d8ddd9; border-radius: 8px;
    padding: 40px 48px; max-width: 640px; width: 90%; box-shadow: 0 4px 16px rgba(26,46,46,0.08);
  }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.3px; }
  p { margin: 0 0 24px; color: #5a7070; font-size: 14px; }
  .page-list { display: flex; flex-direction: column; gap: 10px; }
  .page-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-radius: 6px; border: 1px solid #e8ece9;
    background: #f5f7f6; text-decoration: none; color: #1a2e2e;
    transition: all 150ms; cursor: pointer;
  }
  .page-item:hover { border-color: #3d8e86; background: rgba(61,142,134,0.04); }
  .page-item strong { font-size: 14px; }
  .page-item span { font-size: 12px; color: #8a9e96; }
  .badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.4px;
    padding: 3px 10px; border-radius: 4px; text-transform: uppercase;
  }
  .badge-primary { background: rgba(61,142,134,0.12); color: #3d8e86; }
  .badge-soon { background: #e8ece9; color: #8a9e96; }
  .footer { margin-top: 24px; font-size: 12px; color: #8a9e96; }
</style>
</head>
<body>
<div class="card">
  <h1>Agent Studio — UI 设计稿</h1>
  <p>基于 DESIGN.md 「竹林工坊」设计系统的高保真页面设计稿。支持明暗模式切换。</p>
  <div class="page-list">
    <a class="page-item" href="./workflow-workspace.html">
      <div>
        <strong>Workflow Workspace</strong>
        <span style="display:block;margin-top:2px;">工作流运行管理主工作区 — 功能最丰富的页面</span>
      </div>
      <span class="badge badge-primary">已输出</span>
    </a>
    <div class="page-item" style="opacity:0.6;cursor:default;">
      <div>
        <strong>Agent Manager</strong>
        <span style="display:block;margin-top:2px;">Agent 定义 CRUD 页面</span>
      </div>
      <span class="badge badge-soon">待设计</span>
    </div>
    <div class="page-item" style="opacity:0.6;cursor:default;">
      <div>
        <strong>Single Run Panel</strong>
        <span style="display:block;margin-top:2px;">单次 Agent 运行 + 实时对话</span>
      </div>
      <span class="badge badge-soon">待设计</span>
    </div>
    <div class="page-item" style="opacity:0.6;cursor:default;">
      <div>
        <strong>Templates View</strong>
        <span style="display:block;margin-top:2px;">工作流模板 CRUD</span>
      </div>
      <span class="badge badge-soon">待设计</span>
    </div>
    <div class="page-item" style="opacity:0.6;cursor:default;">
      <div>
        <strong>Settings Panel</strong>
        <span style="display:block;margin-top:2px;">应用设置与 Provider 配置</span>
      </div>
      <span class="badge badge-soon">待设计</span>
    </div>
  </div>
  <div class="footer">设计规范来源：DESIGN.md · 东方自然色系 × 现代工具美学</div>
</div>
</body>
</html>
