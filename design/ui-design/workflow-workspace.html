<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Studio — Workflow Workspace 设计稿</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root {
    --brand-primary: #3d8e86;
    --brand-primary-hover: #206864;
    --brand-secondary: #55bb8b;
    --brand-accent: #6abd79;
    --brand-muted: #9ab378;
    --brand-surface: #77d2d1;
    --brand-deep: #28414a;
    --brand-dark: #364e36;

    --semantic-success: #6abd79;
    --semantic-warning: #e5a832;
    --semantic-error: #d64545;
    --semantic-info: #3d8e86;
    --semantic-running: #3d8e86;

    --neutral-bg: #ffffff;
    --neutral-surface: #f5f7f6;
    --neutral-surface-raised: #ffffff;
    --neutral-border: #d8ddd9;
    --neutral-border-subtle: #e8ece9;
    --neutral-text-primary: #1a2e2e;
    --neutral-text-secondary: #5a7070;
    --neutral-text-muted: #8a9e96;
    --neutral-canvas: #eef1f0;
    --neutral-canvas-dot: #d0d8d4;

    --shadow-sm: 0 2px 4px rgba(26, 46, 46, 0.08);
    --shadow-md: 0 4px 12px rgba(26, 46, 46, 0.1);
    --shadow-lg: 0 8px 24px rgba(26, 46, 46, 0.12);
  }

  .dark {
    --neutral-bg: #1a2a2a;
    --neutral-surface: #223535;
    --neutral-surface-raised: #2a4040;
    --neutral-border: #3a5050;
    --neutral-border-subtle: #2e4242;
    --neutral-text-primary: #e0ebe6;
    --neutral-text-secondary: #8aada0;
    --neutral-text-muted: #5a7a70;
    --neutral-canvas: #162222;
    --neutral-canvas-dot: #2a4040;
    --shadow-sm: 0 2px 4px rgba(0,0,0,0.25);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", monospace;
    font-size: 14px;
    line-height: 1.6;
    color: var(--neutral-text-primary);
    background: var(--neutral-bg);
    -webkit-font-smoothing: antialiased;
  }

  /* Animations */
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(61, 142, 134, 0.35); }
    70% { box-shadow: 0 0 0 6px rgba(61, 142, 134, 0); }
    100% { box-shadow: 0 0 0 0 rgba(61, 142, 134, 0); }
  }
  @keyframes flow-dash {
    to { stroke-dashoffset: -20; }
  }
  @keyframes typing-dot {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }

  /* App Shell */
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .app-header {
    height: 48px;
    border-bottom: 1px solid var(--neutral-border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    background: var(--neutral-surface-raised);
    flex-shrink: 0;
  }
  .app-brand { display: flex; align-items: baseline; gap: 10px; }
  .app-brand h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: -0.2px; }
  .app-subtitle { font-size: 12px; color: var(--neutral-text-muted); }
  .topbar-chips { display: flex; gap: 8px; }
  .topbar-chip {
    font-size: 11px; font-weight: 500; color: var(--neutral-text-secondary);
    background: var(--neutral-surface);
    border: 1px solid var(--neutral-border-subtle);
    padding: 2px 10px; border-radius: 4px; letter-spacing: 0.2px;
  }

  .app-body { display: flex; flex: 1; overflow: hidden; }

  /* ModeRail */
  .mode-rail {
    width: 48px; flex-shrink: 0;
    border-right: 1px solid var(--neutral-border);
    background: var(--neutral-surface);
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 0; gap: 4px;
  }
  .mode-rail-btn {
    width: 36px; height: 36px; border-radius: 6px;
    border: none; background: transparent; color: var(--neutral-text-muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 150ms;
  }
  .mode-rail-btn:hover { background: var(--neutral-surface-raised); color: var(--neutral-text-primary); }
  .mode-rail-btn.active { background: rgba(61, 142, 134, 0.1); color: var(--brand-primary); }

  /* Workflow Workspace */
  .workflow-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }

  /* Sidebar Shell */
  .workflow-sidebar-shell {
    width: 280px; flex-shrink: 0;
    border-right: 1px solid var(--neutral-border);
    background: var(--neutral-bg);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .workflow-tabs {
    display: flex; border-bottom: 1px solid var(--neutral-border);
    padding: 0 12px;
  }
  .workflow-tabs button {
    flex: 1; padding: 10px 0; border: none; background: transparent;
    font-family: inherit; font-size: 12px; font-weight: 600;
    color: var(--neutral-text-muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 150ms;
  }
  .workflow-tabs button.active {
    color: var(--brand-primary);
    border-bottom-color: var(--brand-primary);
  }

  /* Runs List */
  .workflow-runs-header {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--neutral-border-subtle);
  }
  .workflow-runs-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .workflow-runs-header p { margin: 0; font-size: 11px; color: var(--neutral-text-muted); line-height: 1.4; }
  .workflow-runs-actions { margin-top: 10px; }
  .btn {
    font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
    border-radius: 4px; padding: 7px 14px; border: 1px solid var(--neutral-border);
    background: transparent; color: var(--neutral-text-primary);
    transition: all 150ms; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--neutral-surface); }
  .btn-primary {
    background: var(--brand-primary); color: #fff; border-color: var(--brand-primary);
  }
  .btn-primary:hover { background: var(--brand-primary-hover); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { background: var(--semantic-error); color: #fff; border-color: var(--semantic-error); }

  .workflow-run-filters {
    display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--neutral-border-subtle);
    overflow-x: auto;
  }
  .workflow-run-filters button {
    font-family: inherit; font-size: 11px; font-weight: 500;
    padding: 4px 10px; border-radius: 4px; border: none;
    background: transparent; color: var(--neutral-text-muted); cursor: pointer; white-space: nowrap;
  }
  .workflow-run-filters button.active {
    background: rgba(61, 142, 134, 0.1); color: var(--brand-primary); font-weight: 600;
  }

  .workflow-run-cards { flex: 1; overflow-y: auto; padding: 8px; }
  .workflow-run-card {
    border-radius: 6px; border: 1px solid var(--neutral-border-subtle);
    background: var(--neutral-surface-raised);
    padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
    transition: all 150ms; position: relative;
  }
  .workflow-run-card:hover { border-color: var(--neutral-border); box-shadow: var(--shadow-sm); }
  .workflow-run-card-active {
    border-color: var(--brand-primary);
    background: rgba(61, 142, 134, 0.04);
  }
  .workflow-run-card-waiting { border-left: 3px solid var(--semantic-warning); }
  .workflow-run-card-error { border-left: 3px solid var(--semantic-error); }

  .workflow-run-card-main {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    margin-bottom: 6px;
  }
  .workflow-run-card-title strong { font-size: 13px; font-weight: 600; }
  .workflow-run-scheduled-badge { font-size: 10px; color: var(--brand-muted); margin-right: 4px; }
  .workflow-run-card-status {
    font-size: 10px; font-weight: 600; letter-spacing: 0.4px;
    padding: 2px 8px; border-radius: 4px; white-space: nowrap;
  }
  .workflow-run-card-status-running { background: rgba(61, 142, 134, 0.12); color: var(--brand-primary); }
  .workflow-run-card-status-awaiting-input { background: rgba(229, 168, 50, 0.12); color: #b07d1a; }
  .workflow-run-card-status-awaiting-confirm { background: rgba(229, 168, 50, 0.12); color: #b07d1a; }
  .workflow-run-card-status-completed { background: rgba(106, 189, 121, 0.12); color: #4a9e5a; }
  .workflow-run-card-status-error { background: rgba(214, 69, 69, 0.10); color: #c43a3a; }

  .workflow-run-card > p { margin: 0 0 8px; font-size: 11px; color: var(--neutral-text-muted); }
  .workflow-run-card-progress { display: flex; gap: 2px; height: 3px; margin-bottom: 8px; }
  .workflow-run-card-segment { flex: 1; border-radius: 2px; background: var(--neutral-border-subtle); }
  .workflow-run-card-segment-done { background: var(--semantic-success); }
  .workflow-run-card-segment-running { background: var(--semantic-running); animation: pulse-ring 2s infinite; }
  .workflow-run-card-segment-error { background: var(--semantic-error); }
  .workflow-run-card-segment-pending { background: var(--neutral-border-subtle); }

  .workflow-run-card-tail { font-size: 11px; color: var(--neutral-text-muted); line-height: 1.45; }
  .workflow-run-card-tail span { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Run Detail */
  .workflow-run-detail { flex: 1; display: flex; overflow: hidden; background: var(--neutral-bg); }
  .workflow-run-detail-empty {
    flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--neutral-text-muted);
  }
  .codex-left { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .codex-right {
    width: 380px; flex-shrink: 0; border-left: 1px solid var(--neutral-border);
    background: var(--neutral-surface-raised); display: flex; flex-direction: column;
  }
  .codex-resize-handle {
    width: 4px; cursor: col-resize; background: transparent;
    border-left: 1px solid var(--neutral-border);
  }

  .workflow-run-detail-header {
    padding: 14px 18px; border-bottom: 1px solid var(--neutral-border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    flex-shrink: 0;
  }
  .workflow-detail-title { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .workflow-detail-title h2 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.2px; }
  .workflow-run-status {
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    padding: 3px 10px; border-radius: 4px;
  }
  .workflow-run-status-running { background: rgba(61, 142, 134, 0.12); color: var(--brand-primary); }
  .workflow-run-status-awaiting-confirm { background: rgba(229, 168, 50, 0.12); color: #b07d1a; }
  .workflow-run-status-completed { background: rgba(106, 189, 121, 0.12); color: #4a9e5a; }
  .workflow-run-cost { font-size: 11px; color: var(--neutral-text-muted); }

  .workflow-run-detail-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .workflow-step-nav {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-bottom: 1px solid var(--neutral-border-subtle);
    overflow-x: auto; flex-shrink: 0;
  }
  .workflow-step-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 6px; border: 1.5px solid var(--neutral-border);
    background: var(--neutral-surface-raised); cursor: pointer; font-family: inherit;
    font-size: 12px; color: var(--neutral-text-primary); white-space: nowrap;
    transition: all 150ms;
  }
  .workflow-step-chip:hover { border-color: var(--neutral-border); background: var(--neutral-surface); }
  .workflow-step-chip-active { border-color: var(--brand-primary); background: rgba(61, 142, 134, 0.06); }
  .workflow-step-chip-running { border-color: var(--semantic-running); animation: pulse-ring 2s infinite; }
  .workflow-step-chip-success { border-color: var(--semantic-success); border-left: 3px solid var(--semantic-success); }
  .workflow-step-chip-error { border-color: var(--semantic-error); border-left: 3px solid var(--semantic-error); }
  .workflow-step-chip-num {
    width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    border-radius: 4px; background: var(--neutral-surface);
    font-size: 10px; font-weight: 700; color: var(--neutral-text-muted);
  }
  .workflow-step-chip-active .workflow-step-chip-num { background: var(--brand-primary); color: #fff; }
  .workflow-step-chip-arrow { color: var(--neutral-text-muted); display: flex; align-items: center; }

  .parallel-group-stack { display: flex; align-items: center; gap: 4px; position: relative; padding-left: 8px; }
  .parallel-group-bracket {
    position: absolute; left: 0; top: 2px; bottom: 2px; width: 3px;
    border-left: 2px solid var(--neutral-border); border-top: 2px solid var(--neutral-border); border-bottom: 2px solid var(--neutral-border);
    border-radius: 4px 0 0 4px;
  }

  .parallel-transcript-tabs {
    display: flex; gap: 2px; padding: 8px 18px 0; border-bottom: 1px solid var(--neutral-border-subtle);
    flex-shrink: 0;
  }
  .parallel-tab {
    font-family: inherit; font-size: 12px; padding: 6px 12px;
    border: none; background: transparent; color: var(--neutral-text-muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; display: inline-flex; align-items: center; gap: 6px;
  }
  .parallel-tab-active { color: var(--brand-primary); border-bottom-color: var(--brand-primary); font-weight: 600; }
  .parallel-tab-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--neutral-border); }
  .parallel-tab-dot-running { background: var(--semantic-running); }
  .parallel-tab-dot-done { background: var(--semantic-success); }
  .parallel-tab-dot-error { background: var(--semantic-error); }

  .workflow-prompt-section {
    padding: 10px 18px; border-bottom: 1px solid var(--neutral-border-subtle); flex-shrink: 0;
  }
  .workflow-prompt-display {
    background: var(--neutral-surface); border: 1px solid var(--neutral-border-subtle);
    border-radius: 6px; padding: 10px 12px; cursor: pointer; transition: all 150ms;
  }
  .workflow-prompt-display:hover { border-color: var(--neutral-border); }
  .workflow-prompt-label { font-size: 10px; font-weight: 600; color: var(--neutral-text-muted); text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 4px; }
  .workflow-prompt-text { font-size: 13px; color: var(--neutral-text-primary); display: block; line-height: 1.5; }
  .workflow-prompt-edit-hint { font-size: 11px; color: var(--neutral-text-muted); display: block; margin-top: 6px; }

  .workflow-run-warning {
    margin: 10px 18px 0; padding: 8px 12px; border-radius: 6px;
    background: rgba(229, 168, 50, 0.08); border: 1px solid rgba(229, 168, 50, 0.25);
    font-size: 12px; color: #9a7418;
  }
  .workflow-detail-error {
    margin: 10px 18px 0; padding: 8px 12px; border-radius: 6px;
    background: rgba(214, 69, 69, 0.08); border: 1px solid rgba(214, 69, 69, 0.25);
    font-size: 12px; color: #b53535;
  }

  .route-suggestion-inline {
    margin: 10px 18px 0; padding: 10px 14px; border-radius: 6px;
    background: rgba(61, 142, 134, 0.06); border: 1px solid rgba(61, 142, 134, 0.2);
    display: flex; align-items: center; gap: 10px; font-size: 12px;
  }
  .route-suggestion-icon { color: var(--brand-primary); display: flex; }
  .route-suggestion-inline-text { flex: 1; color: var(--neutral-text-primary); }
  .route-suggestion-adopt {
    font-family: inherit; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 4px; border: 1px solid var(--brand-primary);
    background: rgba(61, 142, 134, 0.1); color: var(--brand-primary); cursor: pointer;
  }

  .workflow-step-conversation-bar {
    margin: 10px 18px 0; padding: 10px 14px; border-radius: 6px;
    background: rgba(61, 142, 134, 0.06); border: 1px solid rgba(61, 142, 134, 0.2);
    flex-shrink: 0;
  }
  .workflow-step-conversation-meta {
    display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--neutral-text-muted); margin-bottom: 6px;
  }
  .workflow-step-conversation-copy { font-size: 12px; color: var(--neutral-text-primary); line-height: 1.5; }
  .workflow-awaiting-input-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--semantic-running); margin-right: 6px; vertical-align: middle;
    animation: pulse-ring 2s infinite;
  }

  .codex-transcript-area { flex: 1; overflow-y: auto; padding: 14px 18px; min-height: 0; }

  .transcript-event { margin-bottom: 16px; }
  .transcript-event-meta { font-size: 11px; color: var(--neutral-text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .transcript-event-role { font-weight: 600; color: var(--neutral-text-secondary); }
  .transcript-message {
    padding: 12px 16px; border-radius: 4px; font-size: 14px; line-height: 1.65;
  }
  .transcript-message-user {
    background: rgba(61, 142, 134, 0.08);
    border-radius: 4px 4px 4px 0;
  }
  .transcript-message-ai {
    background: var(--neutral-surface); border: 1px solid var(--neutral-border-subtle);
    border-radius: 4px 4px 0 4px;
  }
  .transcript-message-tool {
    background: var(--neutral-surface); border: 1px solid var(--neutral-border);
    border-radius: 4px; font-size: 12px; color: var(--neutral-text-secondary);
  }
  .transcript-tool-call { padding: 8px 12px; border-bottom: 1px solid var(--neutral-border-subtle); }
  .transcript-tool-result { padding: 8px 12px; background: rgba(61, 142, 134, 0.03); }

  .artifact-cards { margin-top: 16px; }
  .artifact-cards-header { font-size: 12px; font-weight: 600; color: var(--neutral-text-secondary); margin-bottom: 8px; }
  .artifact-cards-count { color: var(--brand-primary); margin-left: 4px; }
  .artifact-card-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 6px; border: 1px solid var(--neutral-border-subtle);
    background: var(--neutral-surface-raised); cursor: pointer; margin-bottom: 6px;
    transition: all 150ms;
  }
  .artifact-card-row:hover { border-color: var(--neutral-border); box-shadow: var(--shadow-sm); }
  .artifact-card-row-active { border-color: var(--brand-primary); background: rgba(61, 142, 134, 0.04); }
  .artifact-card-icon { color: var(--neutral-text-muted); display: flex; }
  .artifact-card-info { flex: 1; min-width: 0; }
  .artifact-card-name { font-size: 12px; font-weight: 600; color: var(--neutral-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .artifact-card-meta { font-size: 11px; color: var(--neutral-text-muted); }
  .artifact-card-open { font-size: 11px; color: var(--brand-primary); font-weight: 500; }

  /* Composer */
  .composer-bar {
    border-top: 1px solid var(--neutral-border);
    background: var(--neutral-bg);
    padding: 10px 18px;
    display: flex; align-items: flex-end; gap: 10px;
    flex-shrink: 0;
  }
  .composer-input-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .composer-textarea {
    width: 100%; resize: none; border: 1px solid var(--neutral-border);
    border-radius: 6px; padding: 10px 12px; font-family: inherit; font-size: 14px;
    color: var(--neutral-text-primary); background: var(--neutral-bg);
    outline: none; line-height: 1.5; min-height: 44px; max-height: 160px;
  }
  .composer-textarea:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 2px rgba(61, 142, 134, 0.15); }
  .composer-textarea::placeholder { color: var(--neutral-text-muted); }
  .composer-attachments { display: flex; gap: 6px; flex-wrap: wrap; }
  .composer-attachment {
    font-size: 11px; color: var(--neutral-text-secondary);
    background: var(--neutral-surface); border: 1px solid var(--neutral-border-subtle);
    padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px;
  }
  .composer-send {
    width: 36px; height: 36px; border-radius: 6px;
    border: none; background: var(--brand-primary); color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 150ms; flex-shrink: 0;
  }
  .composer-send:hover { background: var(--brand-primary-hover); }
  .composer-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* File Preview Pane */
  .codex-preview-pane { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .codex-preview-breadcrumb {
    padding: 10px 14px; border-bottom: 1px solid var(--neutral-border-subtle);
    font-size: 11px; color: var(--neutral-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .codex-breadcrumb-sep { color: var(--neutral-border); margin: 0 2px; }
  .codex-breadcrumb-last { color: var(--neutral-text-primary); font-weight: 600; }
  .codex-preview-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; border-bottom: 1px solid var(--neutral-border-subtle);
  }
  .codex-preview-filename { font-size: 12px; font-weight: 600; }
  .codex-preview-open-btn { font-family: inherit; font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--neutral-border); background: transparent; cursor: pointer; color: var(--neutral-text-secondary); }
  .codex-preview-body { flex: 1; overflow-y: auto; padding: 14px; }
  .codex-preview-code {
    font-family: inherit; font-size: 13px; line-height: 1.7;
    margin: 0; white-space: pre-wrap; word-break: break-word;
  }

  /* Drawer */
  .drawer-overlay {

function RunsList({ runs, selectedId, onSelect }) {
  const [filter, setFilter] = useState('all');
  const filters = [
    { key: 'all', label: 'All' },
    { key: 'running', label: 'Run' },
    { key: 'awaiting-input', label: 'Input' },
    { key: 'awaiting-confirm', label: 'Wait' },
    { key: 'completed', label: 'Done' },
    { key: 'error', label: 'Error' },
  ];
  const filtered = filter === 'all' ? runs : runs.filter(r => r.status === filter || (filter === 'error' && r.status === 'error'));

  function statusLabel(s) {
    const map = { running: 'RUN', 'awaiting-input': 'INPUT', 'awaiting-confirm': 'WAIT', completed: 'DONE', error: 'ERROR', aborted: 'STOP', interrupted: 'INT' };
    return map[s] || s;
  }

  function segments(run) {
    return run.steps.map(s => s.status === 'done' ? 'done' : s.status === 'running' ? 'running' : s.status === 'error' ? 'error' : 'pending');
  }

  return (

        {filters.map(f => (
          <button key={f.key} className={filter === f.key ? 'active' : ''} onClick={() => setFilter(f.key)}>{f.label}</button>
        ))}
      </div>
      <div className="workflow-run-cards">
        {filtered.map(run => (
          <div key={run.id}
            className={[
              'workflow-run-card',
              selectedId === run.id ? 'workflow-run-card-active' : '',
              run.status === 'awaiting-input' || run.status === 'awaiting-confirm' ? 'workflow-run-card-waiting' : '',
              run.status === 'error' ? 'workflow-run-card-error' : ''
            ].filter(Boolean).join(' ')}
            onClick={() => onSelect(run.id)}
          >
            <div className="workflow-run-card-main">
              <div className="workflow-run-card-title"><strong>{run.runName}</strong></div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span className={`workflow-run-card-status workflow-run-card-status-${run.status}`}>{statusLabel(run.status)}</span>

                  <Icon name="trash" size={13} />
                </button>

            <p>{new Date(run.startedAt).toLocaleTimeString()} · {run.projectPath}</p>
            <div className="workflow-run-card-progress">
              {segments(run).map((s, i) => (
                <span key={i} className={`workflow-run-card-segment workflow-run-card-segment-${s}`} />
              ))}

          </div>
        ))}

    </aside>
  );
}

function StepNav({ run, selectedIndex, onSelect }) {
  function groupSteps(steps) {
    const groups = []; let current = null;
    for (let i = 0; i < steps.length; i++) {
      const s = steps[i];
      if (s.parallelGroupId && current?.parallelGroupId === s.parallelGroupId) {
        current.items.push({ step: s, index: i });
      } else {
        current = { parallelGroupId: s.parallelGroupId, items: [{ step: s, index: i }] };
        groups.push(current);
      }
    }
    return groups;
  }
  const groups = groupSteps(run.steps);

  return (
    <div className="workflow-step-nav">
      {groups.map((g, gi) => (
        <React.Fragment key={gi}>
          {gi > 0 && <span className="workflow-step-chip-arrow"><Icon name="arrowRight" size={10} /></span>}
          {g.items.length === 1 ? (
            (() => {
              const { step, index } = g.items[0];
              return (
                <button key={index} className={`workflow-step-chip ${selectedIndex === index ? 'workflow-step-chip-active' : ''} workflow-step-chip-${step.status}`} onClick={() => onSelect(index)}>
                  <span className="workflow-step-chip-num">{index + 1}</span>
                  <span>{step.role || step.displayName || `Step ${index + 1}`}</span>
                </button>
              );
            })()
          ) : (
            <div key={`pg-${g.parallelGroupId}`} className="parallel-group-stack">
              <div className="parallel-group-bracket" />
              {g.items.map(({ step, index }) => (
                <button key={index} className={`workflow-step-chip ${selectedIndex === index ? 'workflow-step-chip-active' : ''} workflow-step-chip-${step.status}`} onClick={() => onSelect(index)} style={{ marginLeft: 4 }}>
                  <span className="workflow-step-chip-num">{index + 1}</span>
                  <span>{step.role || step.displayName || `Step ${index + 1}`}</span>
                </button>
              ))}
            </div>
          )}
        </React.Fragment>
      ))}
    </div>
  );
}

  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);

  const params = new URLSearchParams({
    response_type: 'code',
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    code_challenge: challenge,
    code_challenge_method: 'S256',
    scope: 'openid profile',
  });

  window.location.href = \`\${AUTH_ENDPOINT}?\${params}\`;
}

export async function exchangeCode(code: string, verifier: string) {
  const res = await fetch(TOKEN_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      client_id: CLIENT_ID,
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier,
    }),
  });
  return res.json();
}`}</pre>
          </div>
        </div>
      </div>
    </main>
  );
}

          </div>
          <div className="view-toggle">
            <button className={view === 'detail' ? 'active' : ''} onClick={() => setView('detail')}>Run Detail</button>
            <button className={view === 'canvas' ? 'active' : ''} onClick={() => setView('canvas')}>Canvas</button>
            <button className={view === 'new-run' ? 'active' : ''} onClick={() => setView('new-run')}>New Run</button>
          </div>

          {view === 'detail' && (
            <>
              <div className="workflow-sidebar-shell">
                <div className="workflow-tabs" role="tablist">
                  <button className="active">Runs</button>
                  <button>Schedules</button>
                </div>
                <RunsList runs={mockRuns} selectedId={selectedRunId} onSelect={setSelectedRunId} />
              </div>
              <RunDetail run={selectedRun} selectedStepIndex={selectedStepIndex} onSelectStep={setSelectedStepIndex} />
            </>
          )}

          {view === 'canvas' && <CanvasView />}

          {view === 'new-run' && <NewRunDrawer onClose={() => setView('detail')} />}
        </section>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
