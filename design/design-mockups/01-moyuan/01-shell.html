<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — App Shell — 墨垣</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'mo-bg': '#0B0C10',
            'mo-surface': '#14161A',
            'mo-float': '#1C1F26',
            'mo-border': '#2A2D35',
            'mo-gold': '#C9A96E',
            'mo-gold-soft': '#B8976A',
            'mo-jade': '#6B8F71',
            'mo-text': '#E8E0D5',
            'mo-muted': '#8B8578',
            'mo-error': '#C4554D',
            'mo-warn': '#D4953A'
          },
          fontFamily: {
            'display': ['"Noto Serif SC"', 'serif'],
            'sans': ['Inter', 'system-ui', 'sans-serif'],
            'mono': ['"JetBrains Mono"', 'monospace']
          },
          animation: {
            'ink-pulse': 'inkPulse 4s ease-in-out infinite',
            'seal-reveal': 'sealReveal 0.8s ease-out forwards',
            'float': 'float 6s ease-in-out infinite'
          },
          keyframes: {
            inkPulse: {
              '0%, 100%': { opacity: 0.3 },
              '50%': { opacity: 0.6 }
            },
            sealReveal: {
              '0%': { transform: 'scale(0.8)', opacity: 0 },
              '100%': { transform: 'scale(1)', opacity: 1 }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-6px)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    :root { color-scheme: dark; }
    body {
      background-color: #0B0C10;
      color: #E8E0D5;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .ink-texture {
      position: relative;
      overflow: hidden;
    }
    .ink-texture::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      mix-blend-mode: overlay;
    }
    .mountain-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='200' height='100' viewBox='0 0 200 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 L40 60 L80 90 L120 40 L160 80 L200 50 L200 100 Z' fill='none' stroke='%23C9A96E' stroke-width='0.5' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 200px 100px;
    }
    .gold-glow {
      box-shadow: 0 0 0 1px rgba(201,169,110,0.3), 0 0 20px rgba(201,169,110,0.08);
    }
    .mode-item {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mode-item:hover {
      background: linear-gradient(90deg, rgba(201,169,110,0.08) 0%, transparent 100%);
    }
    .mode-item.active {
      background: linear-gradient(90deg, rgba(201,169,110,0.15) 0%, transparent 100%);
      border-right: 2px solid #C9A96E;
    }
    .seal-stamp {
      width: 28px;
      height: 28px;
      border: 1.5px solid #C4554D;
      color: #C4554D;
      font-family: 'Noto Serif SC', serif;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transform: rotate(-3deg);
    }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden antialiased">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const MODES = [
      { id: 'workflow', label: 'Workflow', icon: 'workflow', desc: '运行与监控' },
      { id: 'templates', label: 'Templates', icon: 'git-branch', desc: '画布编排' },
      { id: 'agents', label: 'Agents', icon: 'bot', desc: 'Agent 管理' },
      { id: 'single', label: 'Single', icon: 'message-square', desc: '单次运行' },
      { id: 'settings', label: 'Settings', icon: 'settings', desc: '系统设置' }
    ];

    function ModeRail({ active, onChange }) {
      return (
        <nav className="w-20 h-full bg-mo-surface border-r border-mo-border flex flex-col items-center py-6 ink-texture relative z-10">
          <div className="seal-stamp mb-8 animate-seal-reveal">墨</div>
          <div className="flex-1 flex flex-col gap-2 w-full px-2">
            {MODES.map(m => {
              const isActive = active === m.id;
              const Icon = window.lucide.icons[m.icon];
              return (
                <button
                  key={m.id}
                  onClick={() => onChange(m.id)}
                  className={`mode-item group relative w-full aspect-square rounded-xl flex flex-col items-center justify-center gap-1.5 ${isActive ? 'active' : 'text-mo-muted'}`}
                  title={m.label}
                >
                  <div className={`p-2 rounded-lg transition-all ${isActive ? 'text-mo-gold bg-mo-gold/10' : 'group-hover:text-mo-text group-hover:bg-mo-float'}`}>
                    <Icon size={20} strokeWidth={1.5} />
                  </div>
                  <span className={`text-[10px] font-medium tracking-wide ${isActive ? 'text-mo-gold' : ''}`}>{m.label.slice(0, 4)}</span>
                  {isActive && <span className="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-6 bg-mo-gold rounded-r-full" />}
                </button>
              );
            })}
          </div>
          <div className="mt-auto pt-4 border-t border-mo-border/50 w-14">
            <button className="w-full aspect-square rounded-xl flex items-center justify-center text-mo-muted hover:text-mo-text hover:bg-mo-float transition-colors">
              <window.lucide.icons['help-circle'] size={20} strokeWidth={1.5} />
            </button>
          </div>
        </nav>
      );
    }

    function Header() {
      return (
        <header className="h-14 bg-mo-surface/80 backdrop-blur-md border-b border-mo-border flex items-center justify-between px-5 ink-texture">
          <div className="flex items-center gap-3">
            <h1 className="font-display text-xl font-semibold text-mo-gold tracking-wider">Agent Studio</h1>
            <span className="text-xs text-mo-muted font-display">墨垣 · 东方智识</span>
          </div>
          <div className="flex items-center gap-4">
            <div className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-mo-float border border-mo-border text-xs">
              <span className="w-1.5 h-1.5 rounded-full bg-mo-jade animate-pulse"></span>
              <span className="text-mo-muted">Claude CLI</span>
              <span className="text-mo-text">就绪</span>
            </div>
            <div className="flex items-center gap-3 text-xs text-mo-muted">
              <span className="flex items-center gap-1.5"><window.lucide.icons['cpu'] size={13} /> 12 runs</span>
              <span className="flex items-center gap-1.5"><window.lucide.icons['coins'] size={13} /> $2.41</span>
            </div>
            <button className="w-8 h-8 rounded-lg flex items-center justify-center text-mo-muted hover:text-mo-text hover:bg-mo-float transition-colors">
              <window.lucide.icons['bell'] size={18} strokeWidth={1.5} />
            </button>
            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-mo-gold/30 to-mo-jade/30 border border-mo-gold/40 flex items-center justify-center text-xs font-display text-mo-gold">Z</div>
          </div>
        </header>
      );
    }

    function EmptyWorkspace({ mode }) {
      const labels = {
        workflow: '工作流运行',
        templates: '工作流模板',
        agents: 'Agent 管理',
        single: '单次运行',
        settings: '系统设置'
      };
      return (
        <div className="flex-1 flex flex-col items-center justify-center mountain-pattern ink-texture">
          <div className="relative w-64 h-40 mb-8 opacity-40">
            <svg viewBox="0 0 256 160" className="w-full h-full text-mo-gold">
              <path d="M0 160 L48 80 L96 128 L144 48 L192 104 L256 32 L256 160 Z" fill="currentColor" fillOpacity="0.08" stroke="currentColor" strokeWidth="1" strokeOpacity="0.3"/>
              <circle cx="200" cy="40" r="24" fill="currentColor" fillOpacity="0.06" />
            </svg>
          </div>
          <h2 className="font-display text-2xl text-mo-text mb-2">{labels[mode]}</h2>
          <p className="text-sm text-mo-muted mb-6">从左侧模式导航开始，或选择一个工作区继续</p>
          <button className="px-5 py-2.5 rounded-lg bg-mo-gold/10 border border-mo-gold/40 text-mo-gold text-sm font-medium hover:bg-mo-gold/20 transition-all flex items-center gap-2">
            <window.lucide.icons['plus'] size={16} />
            新建 {labels[mode]}
          </button>
        </div>
      );
    }

    function App() {
      const [mode, setMode] = useState('workflow');
      useEffect(() => { if (window.lucide && window.lucide.createIcons) window.lucide.createIcons(); }, []);
      return (
        <div className="h-screen w-screen flex flex-col bg-mo-bg">
          <Header />
          <div className="flex-1 flex overflow-hidden">
            <ModeRail active={mode} onChange={setMode} />
            <main className="flex-1 bg-mo-bg relative overflow-hidden">
              <EmptyWorkspace mode={mode} />
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
