<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — Run Detail — 息壤</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'xr-bg': '#F5F2ED',
            'xr-surface': '#FFFFFF',
            'xr-float': '#FAF9F6',
            'xr-border': '#E5E0D8',
            'xr-green': '#5B8C5A',
            'xr-green-light': '#6FA36E',
            'xr-brown': '#8B6F47',
            'xr-orange': '#D4956B',
            'xr-text': '#2C2C2A',
            'xr-muted': '#8C8A84',
            'xr-error': '#C4705A',
            'xr-info': '#5A8FA8'
          },
          fontFamily: {
            'display': ['Newsreader', 'serif'],
            'sans': ['Inter', 'system-ui', 'sans-serif'],
            'mono': ['"JetBrains Mono"', 'monospace']
          }
        }
      }
    }
  </script>
  <style>
    body { background: #F5F2ED; color: #2C2C2A; font-family: 'Inter', sans-serif; }
    .organic-bg {
      background-image:
        radial-gradient(circle at 10% 20%, rgba(91, 140, 90, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(212, 149, 107, 0.04) 0%, transparent 40%);
    }
    .soft-shadow { box-shadow: 0 2px 12px rgba(44, 44, 42, 0.06), 0 1px 3px rgba(44, 44, 42, 0.04); }
    .chip-running { box-shadow: 0 0 0 1px #5B8C5A, 0 0 12px rgba(91, 140, 90, 0.2); }
    .pulse-dot { animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #E5E0D8; border-radius: 3px; }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState } = React;

    const Icon = ({ name, size = 16, className = '' }) => {
      const icons = {
        workflow: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><path d="M10 6.5h4M10 6.5v4M17.5 10v4M6.5 10v7H10"/></svg>,
        bot: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><rect x="4" y="8" width="16" height="12" rx="3"/><path d="M9 8V6a3 3 0 016 0v2"/><circle cx="9" cy="14" r="1.5" fill="currentColor"/><circle cx="15" cy="14" r="1.5" fill="currentColor"/></svg>,
        search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>,
        filter: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
        plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M12 5v14M5 12h14"/></svg>,
        edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
        chevronDown: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M6 9l6 6 6-6"/></svg>,
        check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
        x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M18 6L6 18M6 6l12 12"/></svg>,
        file: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
        gitBranch: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 01-9 9"/></svg>,
        settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      };
      return icons[name] || null;
    };

    const runs = [
      { id: 1, name: 'Refactor auth module', status: 'running', time: '14:32', tokens: '12.4k', cost: '$0.42' },
      { id: 2, name: 'Update API docs', status: 'completed', time: '13:10', tokens: '8.1k', cost: '$0.28' },
      { id: 3, name: 'Fix CI pipeline', status: 'error', time: '11:45', tokens: '4.2k', cost: '$0.15' },
      { id: 4, name: 'Add unit tests', status: 'aborted', time: '10:22', tokens: '2.1k', cost: '$0.07' },
      { id: 5, name: 'Optimize queries', status: 'awaiting-input', time: '09:55', tokens: '6.7k', cost: '$0.21' }
    ];

    const steps = [
      { id: 1, label: 'Architect', status: 'done' },
      { id: 2, label: 'Coder', status: 'running' },
      { id: 3, label: 'Reviewer', status: 'pending' },
      { id: 4, label: 'Tester', status: 'pending' },
      { id: 5, label: 'DocWriter', status: 'pending' }
    ];

    const transcripts = [
      { type: 'tool', agent: 'Architect', content: 'analyze_project_structure → 发现 14 个相关文件', time: '14:32:01' },
      { type: 'think', agent: 'Architect', content: '我需要先理解当前 auth 模块的依赖关系，再提出重构方案。', time: '14:32:03' },
      { type: 'text', agent: 'Architect', content: '已生成重构计划：1) 提取 token 验证逻辑到 middleware；2) 统一错误码；3) 补充 refresh token 轮换。', time: '14:32:08' },
      { type: 'handoff', agent: 'Architect → Coder', content: 'handoff 至 Coder 执行具体修改', time: '14:32:09' },
      { type: 'tool', agent: 'Coder', content: 'edit_file src/auth/middleware.ts (+45, -12)', time: '14:32:12' },
      { type: 'tool', agent: 'Coder', content: 'edit_file src/auth/token.ts (+88, -31)', time: '14:32:15' },
      { type: 'text', agent: 'Coder', content: '正在应用第二处修改，预计还需要 2-3 步。', time: '14:32:18', live: true }
    ];

    const artifacts = [
      { name: 'middleware.ts', type: 'ts', lines: '+45 -12' },
      { name: 'token.ts', type: 'ts', lines: '+88 -31' },
      { name: 'errors.ts', type: 'ts', lines: '+23 -0' }
    ];

    function StatusBadge({ status }) {
      const styles = {
        running: 'text-xr-green border-xr-green/40 bg-xr-green/10',
        completed: 'text-xr-brown border-xr-brown/40 bg-xr-brown/10',
        error: 'text-xr-error border-xr-error/40 bg-xr-error/10',
        aborted: 'text-xr-muted border-xr-border bg-xr-float',
        'awaiting-input': 'text-xr-info border-xr-info/40 bg-xr-info/10'
      };
      const labels = {
        running: '运行中', completed: '已完成', error: '错误', aborted: '已中止', 'awaiting-input': '等待输入'
      };
      return (
        <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full border text-xs font-medium ${styles[status]}`}>
          {status === 'running' && <span className="w-1.5 h-1.5 rounded-full bg-current pulse-dot"/>}
          {labels[status]}
        </span>
      );
    }

    function StepChip({ step }) {
      const statusStyles = {
        done: 'border-xr-brown text-xr-brown bg-xr-brown/10',
        running: 'chip-running border-xr-green text-xr-green bg-xr-green/10',
        pending: 'border-xr-border text-xr-muted bg-xr-bg'
      };
      return (
        <button className={`flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-medium transition-all hover:brightness-105 ${statusStyles[step.status]}`}>
          <span className="w-4 h-4 rounded-full border border-current flex items-center justify-center text-[9px]">
            {step.status === 'done' ? '✓' : step.id}
          </span>
          {step.label}
        </button>
      );
    }

    function RunsList() {
      const [selected, setSelected] = useState(1);
      return (
        <aside className="w-64 bg-xr-surface border-r border-xr-border flex flex-col shrink-0 soft-shadow">
          <div className="p-3 border-b border-xr-border space-y-2">
            <div className="flex items-center justify-between">
              <span className="text-xs font-semibold text-xr-muted uppercase tracking-wider">Runs</span>
              <button className="p-1 rounded-full text-xr-green hover:bg-xr-green/10"><Icon name="plus" size={14}/></button>
            </div>
            <div className="relative">
              <Icon name="search" size={13} className="absolute left-2 top-1/2 -translate-y-1/2 text-xr-muted"/>
              <input type="text" placeholder="搜索运行..." className="w-full bg-xr-bg border border-xr-border rounded-xl pl-7 pr-2 py-1 text-xs text-xr-text placeholder:text-xr-muted outline-none focus:border-xr-green"/>
            </div>
            <button className="flex items-center gap-1.5 text-xs text-xr-muted hover:text-xr-text"><Icon name="filter" size={12}/> 全部状态</button>
          </div>
          <div className="flex-1 overflow-y-auto p-2 space-y-1">
            {runs.map(r => (
              <div
                key={r.id}
                onClick={() => setSelected(r.id)}
                className={`p-3 rounded-2xl border cursor-pointer transition-all ${selected === r.id ? 'bg-xr-float border-xr-green soft-shadow' : 'bg-xr-bg border-xr-border hover:border-xr-green/40'}`}
              >
                <div className="flex items-start justify-between mb-1">
                  <span className="text-sm text-xr-text font-medium truncate pr-2">{r.name}</span>
                  <StatusBadge status={r.status} />
                </div>
                <div className="flex items-center justify-between text-[10px] text-xr-muted">
                  <span>{r.time}</span>
                  <span>{r.tokens} · {r.cost}</span>
                </div>
              </div>
            ))}
          </div>
        </aside>
      );
    }

    function RunDetail() {
      return (
        <div className="flex-1 flex flex-col min-w-0 bg-xr-bg organic-bg relative">
          <div className="h-14 border-b border-xr-border flex items-center justify-between px-4 shrink-0">
            <div className="flex items-center gap-3">
              <input defaultValue="Refactor auth module" className="bg-transparent text-xr-text font-medium text-sm border border-transparent hover:border-xr-border focus:border-xr-green rounded-xl px-2 py-1 outline-none w-56"/>
              <StatusBadge status="running" />
            </div>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-3 text-xs text-xr-muted">
                <span className="flex items-center gap-1">Tokens: <strong className="text-xr-text">12.4k</strong></span>
                <span className="flex items-center gap-1">Cost: <strong className="text-xr-text">$0.42</strong></span>
              </div>
              <div className="flex items-center gap-1">
                <button className="px-3 py-1.5 rounded-xl border border-xr-error/40 text-xr-error text-xs hover:bg-xr-error/10">Abort</button>
                <button className="px-3 py-1.5 rounded-xl border border-xr-border text-xr-muted text-xs hover:text-xr-text hover:bg-xr-float">Rerun</button>
              </div>
            </div>
          </div>

          <div className="px-4 py-3 border-b border-xr-border flex items-center gap-2 overflow-x-auto">
            {steps.map(s => <StepChip key={s.id} step={s} />)}
          </div>

          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            <div className="rounded-2xl border border-xr-border bg-xr-surface overflow-hidden soft-shadow">
              <button className="w-full flex items-center justify-between px-4 py-2.5 bg-xr-float/50 text-xs text-xr-muted hover:text-xr-text">
                <span className="flex items-center gap-2"><Icon name="edit" size={13}/> 当前步骤 Prompt</span>
                <Icon name="chevronDown" size={14}/>
              </button>
              <div className="p-4">
                <pre className="text-xs text-xr-text font-mono leading-relaxed whitespace-pre-wrap">{`你是一名资深 TypeScript 工程师。请根据 Architect 给出的方案重构 auth 模块。\n\n要求：\n- 保持现有 API 不变\n- 补充单元测试\n- 使用依赖注入解耦`}</pre>
              </div>
            </div>

            <div className="space-y-2">
              <div className="flex items-center justify-between">
                <span className="text-xs font-semibold text-xr-muted uppercase tracking-wider">Transcript</span>
                <div className="flex items-center gap-2">
                  <Icon name="search" size={13} className="text-xr-muted"/>
                  <input type="text" placeholder="搜索..." className="bg-xr-bg border border-xr-border rounded-xl px-2 py-1 text-xs text-xr-text outline-none focus:border-xr-green w-32"/>
                </div>
              </div>
              <div className="rounded-2xl border border-xr-border bg-xr-surface p-3 space-y-3 soft-shadow">
                {transcripts.map((t, i) => (
                  <div key={i} className="flex gap-3">
                    <div className="w-16 shrink-0 text-[10px] text-xr-muted font-mono pt-0.5">{t.time}</div>
                    <div className="flex-1">
                      <div className="flex items-center gap-2 mb-1">
                        <span className={`text-[10px] px-1.5 py-0.5 rounded-lg border ${t.type === 'tool' ? 'border-xr-brown/40 text-xr-brown bg-xr-brown/10' : t.type === 'think' ? 'border-xr-muted/40 text-xr-muted' : t.type === 'handoff' ? 'border-xr-green/40 text-xr-green bg-xr-green/10' : 'border-xr-info/40 text-xr-info bg-xr-info/10'}`}>
                          {t.type === 'tool' ? 'TOOL' : t.type === 'think' ? 'THINK' : t.type === 'handoff' ? 'HANDOFF' : 'TEXT'}
                        </span>
                        <span className="text-xs text-xr-green font-medium">{t.agent}</span>
                      </div>
                      <div className={`text-xs leading-relaxed ${t.live ? 'text-xr-text' : 'text-xr-muted'}`}>
                        {t.content}
                        {t.live && <span className="inline-block w-1.5 h-3.5 bg-xr-green ml-0.5 align-middle animate-pulse rounded-sm"/>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="space-y-2">
              <span className="text-xs font-semibold text-xr-muted uppercase tracking-wider">Artifacts</span>
              <div className="flex gap-2">
                {artifacts.map((a, i) => (
                  <button key={i} className="group flex items-center gap-3 px-3 py-2 rounded-2xl bg-xr-surface border border-xr-border hover:border-xr-green transition-all soft-shadow">
                    <div className="w-8 h-8 rounded-xl bg-xr-bg border border-xr-border flex items-center justify-center text-xr-green"><Icon name="file" size={16}/></div>
                    <div className="text-left">
                      <div className="text-xs text-xr-text font-medium">{a.name}</div>
                      <div className="text-[10px] text-xr-brown">{a.lines}</div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="h-16 border-t border-xr-border bg-xr-surface px-4 flex items-center gap-3 shrink-0 soft-shadow">
            <div className="flex-1 relative">
              <input type="text" placeholder="输入将继续发送给 Coder..." className="w-full bg-xr-bg border border-xr-border rounded-2xl pl-4 pr-24 py-2.5 text-sm text-xr-text placeholder:text-xr-muted outline-none focus:border-xr-green"/>
              <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-xr-muted">Enter 发送</span>
            </div>
            <button className="px-5 py-2.5 rounded-2xl bg-xr-green text-white text-sm font-medium hover:bg-xr-green-light transition-colors soft-shadow">Send</button>
          </div>
        </div>
      );
    }

    function PreviewPanel() {
      const [tab, setTab] = useState('code');
      return (
        <aside className="w-80 bg-xr-surface border-l border-xr-border flex flex-col shrink-0 soft-shadow">
          <div className="flex items-center justify-between px-3 py-2 border-b border-xr-border">
            <div className="flex gap-1">
              {['code', 'preview', 'diff'].map(t => (
                <button
                  key={t}
                  onClick={() => setTab(t)}
                  className={`px-2.5 py-1 rounded-xl text-xs font-medium capitalize transition-colors ${tab === t ? 'text-xr-green bg-xr-green/10' : 'text-xr-muted hover:text-xr-text hover:bg-xr-float'}`}
                >
                  {t}
                </button>
              ))}
            </div>
            <button className="text-xr-muted hover:text-xr-text"><Icon name="x" size={14}/></button>
          </div>
          <div className="flex-1 overflow-auto p-3">
            <div className="flex items-center gap-2 mb-3 pb-2 border-b border-xr-border">
              <Icon name="file" size={14} className="text-xr-green"/>
              <span className="text-xs text-xr-text font-medium">token.ts</span>
            </div>
            <pre className="text-[11px] font-mono leading-5 text-xr-text">{`export interface TokenConfig {
  issuer: string;
  audience: string;
  rotationWindow: number;
}

export async function rotateRefreshToken(
  oldToken: string,
  config: TokenConfig
): Promise<{ token: string; expiresAt: Date }> {
  const payload = await verify(oldToken, config);
  // ...
}`}</pre>
          </div>
        </aside>
      );
    }

    function ModeRail() {
      const modes = [
        { id: 'workflow', icon: 'workflow', active: true },
        { id: 'templates', icon: 'gitBranch' },
        { id: 'agents', icon: 'bot' },
        { id: 'single', icon: 'workflow' },
        { id: 'settings', icon: 'settings' }
      ];
      return (
        <nav className="w-16 h-full bg-xr-surface border-r border-xr-border flex flex-col items-center py-5 soft-shadow">
          <div className="w-8 h-8 rounded-2xl bg-gradient-to-br from-xr-green to-xr-green-light flex items-center justify-center text-white text-xs font-display mb-6 soft-shadow">息</div>
          <div className="flex-1 flex flex-col gap-2 w-full px-2">
            {modes.map(m => (
              <button key={m.id} className={`w-full aspect-square rounded-2xl flex items-center justify-center transition-all ${m.active ? 'text-xr-green bg-xr-green/10 border-r-2 border-xr-green' : 'text-xr-muted hover:text-xr-text hover:bg-xr-float'}`}>
                <Icon name={m.icon} size={20}/>
              </button>
            ))}
          </div>
        </nav>
      );
    }

    function App() {
      return (
        <div className="h-screen w-screen flex flex-col bg-xr-bg">
          <div className="h-12 bg-xr-surface border-b border-xr-border flex items-center justify-between px-4 shrink-0 soft-shadow">
            <div className="flex items-center gap-3">
              <span className="font-display text-lg font-semibold text-xr-text">Agent Studio</span>
              <span className="text-xs text-xr-muted italic">息壤</span>
            </div>
          </div>
          <div className="flex-1 flex overflow-hidden">
            <ModeRail />
            <RunsList />
            <RunDetail />
            <PreviewPanel />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
