<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — App Shell — 息壤</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'xr-bg': '#F5F2ED',
            'xr-surface': '#FFFFFF',
            'xr-float': '#FAF9F6',
            'xr-border': '#E5E0D8',
            'xr-green': '#5B8C5A',
            'xr-green-light': '#6FA36E',
            'xr-brown': '#8B6F47',
            'xr-orange': '#D4956B',
            'xr-text': '#2C2C2A',
            'xr-muted': '#8C8A84',
            'xr-error': '#C4705A',
            'xr-info': '#5A8FA8'
          },
          fontFamily: {
            'display': ['Newsreader', 'serif'],
            'sans': ['Inter', 'system-ui', 'sans-serif'],
            'mono': ['"JetBrains Mono"', 'monospace']
          },
          animation: {
            'breathe': 'breathe 4s ease-in-out infinite',
            'float': 'float 6s ease-in-out infinite',
            'grain': 'grain 8s steps(10) infinite'
          },
          keyframes: {
            breathe: {
              '0%, 100%': { transform: 'scale(1)', opacity: 0.8 },
              '50%': { transform: 'scale(1.05)', opacity: 1 }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-4px)' }
            },
            grain: {
              '0%, 100%': { transform: 'translate(0, 0)' },
              '10%': { transform: 'translate(-5%, -10%)' },
              '20%': { transform: 'translate(-15%, 5%)' },
              '30%': { transform: 'translate(7%, -25%)' },
              '40%': { transform: 'translate(-5%, 25%)' },
              '50%': { transform: 'translate(-15%, 10%)' },
              '60%': { transform: 'translate(15%, 0%)' },
              '70%': { transform: 'translate(0%, 15%)' },
              '80%': { transform: 'translate(3%, 35%)' },
              '90%': { transform: 'translate(-10%, 10%)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #F5F2ED;
      color: #2C2C2A;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .paper-texture {
      position: relative;
    }
    .paper-texture::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.6;
    }
    .mode-item {
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .mode-item:hover {
      background: rgba(91, 140, 90, 0.06);
      transform: translateY(-1px);
    }
    .mode-item.active {
      background: linear-gradient(180deg, rgba(91, 140, 90, 0.12) 0%, rgba(91, 140, 90, 0.04) 100%);
      box-shadow: inset 2px 0 0 #5B8C5A;
    }
    .soft-shadow {
      box-shadow: 0 2px 12px rgba(44, 44, 42, 0.06), 0 1px 3px rgba(44, 44, 42, 0.04);
    }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden antialiased">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState } = React;

    const MODES = [
      { id: 'workflow', label: 'Workflow', icon: 'workflow' },
      { id: 'templates', label: 'Templates', icon: 'git-branch' },
      { id: 'agents', label: 'Agents', icon: 'bot' },
      { id: 'single', label: 'Single', icon: 'message-square' },
      { id: 'settings', label: 'Settings', icon: 'settings' }
    ];

    function Icon({ name, size = 20 }) {
      const icons = {
        workflow: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><path d="M10 6.5h4M10 6.5v4M17.5 10v4M6.5 10v7H10"/></svg>,
        'git-branch': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 01-9 9"/></svg>,
        bot: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="4" y="8" width="16" height="12" rx="3"/><path d="M9 8V6a3 3 0 016 0v2"/><circle cx="9" cy="14" r="1.5" fill="currentColor"/><circle cx="15" cy="14" r="1.5" fill="currentColor"/></svg>,
        'message-square': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
        settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
        'help-circle': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
        bell: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>,
        cpu: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6" rx="1"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>,
        coins: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="8" cy="8" r="7"/><path d="M19.5 9a7 7 0 100 10 7 7 0 000-10z"/></svg>
      };
      return icons[name] || null;
    }

    function ModeRail({ active, onChange }) {
      return (
        <nav className="w-20 h-full bg-xr-surface border-r border-xr-border flex flex-col items-center py-6 paper-texture soft-shadow">
          <div className="w-9 h-9 rounded-2xl bg-gradient-to-br from-xr-green to-xr-green-light flex items-center justify-center text-white text-xs font-display mb-8 soft-shadow animate-breathe"
          >息</div>
          <div className="flex-1 flex flex-col gap-2 w-full px-2">
            {MODES.map(m => {
              const isActive = active === m.id;
              return (
                <button
                  key={m.id}
                  onClick={() => onChange(m.id)}
                  className={`mode-item group relative w-full aspect-square rounded-2xl flex flex-col items-center justify-center gap-1.5 ${isActive ? 'active text-xr-green' : 'text-xr-muted'}`}
                  title={m.label}
                >
                  <div className={`p-2 rounded-xl transition-all ${isActive ? 'bg-xr-green/10 text-xr-green' : 'group-hover:bg-xr-float group-hover:text-xr-text'}`}>
                    <Icon name={m.icon} size={20} />
                  </div>
                  <span className={`text-[10px] font-medium ${isActive ? 'text-xr-green' : ''}`}>{m.label.slice(0, 4)}</span>
                  {isActive && <span className="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-6 bg-xr-green rounded-r-full" />}
                </button>
              );
            })}
          </div>
          <div className="mt-auto pt-4 border-t border-xr-border w-14">
            <button className="w-full aspect-square rounded-2xl flex items-center justify-center text-xr-muted hover:text-xr-text hover:bg-xr-float transition-all">
              <Icon name="help-circle" size={20} />
            </button>
          </div>
        </nav>
      );
    }

    function Header() {
      return (
        <header className="h-14 bg-xr-surface/80 backdrop-blur-md border-b border-xr-border flex items-center justify-between px-5 paper-texture soft-shadow">
          <div className="flex items-center gap-3">
            <h1 className="font-display text-xl font-semibold text-xr-text tracking-wide">Agent Studio</h1>
            <span className="text-xs text-xr-muted italic">息壤 · 会呼吸的工具</span>
          </div>
          <div className="flex items-center gap-4">
            <div className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-xr-float border border-xr-border text-xs soft-shadow">
              <span className="w-1.5 h-1.5 rounded-full bg-xr-green animate-pulse"></span>
              <span className="text-xr-muted">Claude CLI</span>
              <span className="text-xr-text">就绪</span>
            </div>
            <div className="flex items-center gap-3 text-xs text-xr-muted">
              <span className="flex items-center gap-1.5"><Icon name="cpu" size={13} /> 12 runs</span>
              <span className="flex items-center gap-1.5"><Icon name="coins" size={13} /> $2.41</span>
            </div>
            <button className="w-8 h-8 rounded-xl flex items-center justify-center text-xr-muted hover:text-xr-text hover:bg-xr-float transition-colors">
              <Icon name="bell" size={18} />
            </button>
            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-xr-green/20 to-xr-orange/20 border border-xr-green/30 flex items-center justify-center text-xs font-display text-xr-green">Z</div>
          </div>
        </header>
      );
    }

    function EmptyWorkspace({ mode }) {
      const labels = {
        workflow: '工作流运行',
        templates: '工作流模板',
        agents: 'Agent 管理',
        single: '单次运行',
        settings: '系统设置'
      };
      return (
        <div className="flex-1 flex flex-col items-center justify-center relative overflow-hidden"
        >
          <div className="absolute inset-0 opacity-30"
003e
            <svg width="100%" height="100%">
              <defs>
                <linearGradient id="soilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#5B8C5A" stopOpacity="0.08"/>
                  <stop offset="100%" stopColor="#D4956B" stopOpacity="0.06"/>
                </linearGradient>
              </defs>
              <circle cx="20%" cy="30%" r="120" fill="url(#soilGrad)" className="animate-float" />
              <circle cx="75%" cy="60%" r="180" fill="url(#soilGrad)" className="animate-float" style={{ animationDelay: '2s' }} />
              <circle cx="50%" cy="80%" r="100" fill="url(#soilGrad)" className="animate-float" style={{ animationDelay: '4s' }} />
            </svg>
          </div>
          <div className="relative w-56 h-40 mb-8">
            <svg viewBox="0 0 224 160" className="w-full h-full text-xr-green">
              <path d="M112 20 C 80 40, 60 70, 60 100 C 60 130, 80 150, 112 150 C 144 150, 164 130, 164 100 C 164 70, 144 40, 112 20" fill="currentColor" fillOpacity="0.08" stroke="currentColor" strokeWidth="1" strokeOpacity="0.3"/>
              <path d="M112 60 L112 120 M90 90 L134 90" stroke="currentColor" strokeWidth="1.5" strokeOpacity="0.4" strokeLinecap="round"/>
              <circle cx="112" cy="50" r="8" fill="currentColor" fillOpacity="0.15" />
            </svg>
          </div>
          <h2 className="font-display text-2xl text-xr-text mb-2">{labels[mode]}</h2>
          <p className="text-sm text-xr-muted mb-6">从左侧模式导航开始，或选择一个工作区继续</p>
          <button className="px-5 py-2.5 rounded-2xl bg-xr-green text-white text-sm font-medium hover:bg-xr-green-light transition-all flex items-center gap-2 soft-shadow">
            <Icon name="workflow" size={16} />
            新建 {labels[mode]}
          </button>
        </div>
      );
    }

    function App() {
      const [mode, setMode] = useState('workflow');
      return (
        <div className="h-screen w-screen flex flex-col bg-xr-bg">
          <Header />
          <div className="flex-1 flex overflow-hidden">
            <ModeRail active={mode} onChange={setMode} />
            <main className="flex-1 bg-xr-bg relative overflow-hidden">
              <EmptyWorkspace mode={mode} />
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
