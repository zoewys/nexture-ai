<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — Canvas — 霓渊</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'ny-bg': '#0A0A0F',
            'ny-surface': '#12121A',
            'ny-float': '#1A1A2E',
            'ny-border': '#2A2A40',
            'ny-pink': '#FF006E',
            'ny-cyan': '#00F0FF',
            'ny-purple': '#B367FF',
            'ny-green': '#00FF88',
            'ny-text': '#E0E0F0',
            'ny-muted': '#7B7B9A',
            'ny-error': '#FF3355'
          },
          fontFamily: {
            'display': ['Orbitron', 'sans-serif'],
            'sans': ['Inter', 'system-ui', 'sans-serif'],
            'mono': ['"JetBrains Mono"', 'monospace']
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0A0A0F; color: #E0E0F0; font-family: 'Inter', sans-serif; }
    .crt-grid {
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.12), transparent);
      animation: scan 6s linear infinite;
      pointer-events: none;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
    .node-selected { box-shadow: 0 0 0 1px #FF006E, 0 0 20px rgba(255,0,110,0.4), inset 0 0 20px rgba(255,0,110,0.05); }
    .neon-border { box-shadow: 0 0 10px rgba(0, 240, 255, 0.15); }
    .parallel-box { background: repeating-linear-gradient(45deg, rgba(255,0,110,0.03), rgba(255,0,110,0.03) 8px, transparent 8px, transparent 16px); }
    .clip-corner { clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
    .clip-corner-sm { clip-path: polygon(0 0, calc(100% - 4px) 0, 100% 4px, 100% 100%, 4px 100%, 0 calc(100% - 4px)); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #2A2A40; border-radius: 0; }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState } = React;

    const Icon = ({ name, size = 16, className = '' }) => {
      const icons = {
        workflow: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><path d="M10 6.5h4M10 6.5v4M17.5 10v4M6.5 10v7H10"/></svg>,
        bot: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M9 8V6a3 3 0 016 0v2"/><circle cx="9" cy="14" r="1.5" fill="currentColor"/><circle cx="15" cy="14" r="1.5" fill="currentColor"/></svg>,
        search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>,
        save: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
        undo: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>,
        redo: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3L21 13"/></svg>,
        zoomIn: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><circle cx="11" cy="11" r="7"/><path d="M11 8v6M8 11h6M21 21l-4.35-4.35"/></svg>,
        zoomOut: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><circle cx="11" cy="11" r="7"/><path d="M8 11h6M21 21l-4.35-4.35"/></svg>,
        maximize: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M8 3H5a2 2 0 00-2 2v3M16 3h3a2 2 0 012 2v3M8 21H5a2 2 0 01-2-2v-3M16 21h3a2 2 0 002-2v-3"/></svg>,
        layout: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
        settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
        chevronDown: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M6 9l6 6 6-6"/></svg>,
        plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><path d="M12 5v14M5 12h14"/></svg>,
        more: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="19" cy="12" r="1" fill="currentColor"/><circle cx="5" cy="12" r="1" fill="currentColor"/></svg>,
        gitBranch: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 01-9 9"/></svg>
      };
      return icons[name] || null;
    };

    const AGENTS = [
      { id: 'a1', name: 'Architect', role: '架构师', vendor: 'claude', model: 'Sonnet 4.6', color: 'ny-pink' },
      { id: 'a2', name: 'Coder', role: '编码者', vendor: 'codex', model: 'codex-1', color: 'ny-cyan' },
      { id: 'a3', name: 'Reviewer', role: '审查员', vendor: 'claude', model: 'Haiku 4.5', color: 'ny-purple' },
      { id: 'a4', name: 'Tester', role: '测试员', vendor: 'api', model: 'DeepSeek-V3', color: 'ny-green' },
      { id: 'a5', name: 'DocWriter', role: '文档员', vendor: 'claude', model: 'Sonnet 4.6', color: 'ny-pink' }
    ];

    function Header() {
      return (
        <header className="h-12 bg-ny-surface border-b border-ny-border flex items-center justify-between px-4 shrink-0 relative">
          <div className="scanline" />
          <div className="flex items-center gap-3">
            <span className="font-display text-sm font-semibold text-ny-pink tracking-widest">AGENT STUDIO</span>
            <div className="h-4 w-px bg-ny-border"/>
            <button className="flex items-center gap-2 px-3 py-1.5 bg-ny-float border border-ny-border text-xs text-ny-text hover:border-ny-pink transition-colors clip-corner-sm"
            >
              CODE REVIEW PIPELINE
              <Icon name="chevronDown" size={12} className="text-ny-muted"/>
            </button>
          </div>
          <div className="flex items-center gap-2">
            {['save','undo','redo'].map(i => (
              <button key={i} className="p-1.5 text-ny-muted hover:text-ny-cyan transition-colors"><Icon name={i} size={15}/></button>
            ))}
            <div className="h-4 w-px bg-ny-border mx-1"/>
            {['zoomOut','zoomIn','maximize','layout'].map(i => (
              <button key={i} className="p-1.5 text-ny-muted hover:text-ny-cyan transition-colors"><Icon name={i} size={15}/></button>
            ))}
            <div className="h-4 w-px bg-ny-border mx-1"/>
            <button className="px-4 py-1.5 bg-ny-pink/10 border border-ny-pink text-ny-pink text-[10px] font-display tracking-wider hover:bg-ny-pink/20 clip-corner-sm"
            >
              EXECUTE
            </button>
          </div>
        </header>
      );
    }

    function AgentSidebar() {
      return (
        <aside className="w-60 bg-ny-surface border-r border-ny-border flex flex-col shrink-0 relative">
          <div className="scanline" style={{ animationDelay: '1s' }} />
          <div className="p-3 border-b border-ny-border">
            <div className="flex items-center justify-between mb-3">
              <span className="text-[10px] font-display text-ny-muted tracking-widest">AGENTS</span>
              <button className="text-ny-pink hover:text-ny-pink"><Icon name="plus" size={16}/></button>
            </div>
            <div className="relative">
              <Icon name="search" size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-ny-muted"/>
              <input
                type="text"
                placeholder="搜索 Agent..."
                className="w-full bg-ny-bg border border-ny-border px-8 py-1.5 text-xs text-ny-text placeholder:text-ny-muted focus:outline-none focus:border-ny-cyan font-mono clip-corner-sm"
              />
            </div>
          </div>
          <div className="flex-1 overflow-y-auto p-2 space-y-1">
            {AGENTS.map(a => (
              <div key={a.id} className="group flex items-center gap-3 p-2.5 bg-ny-bg border border-ny-border hover:border-ny-cyan cursor-grab active:cursor-grabbing transition-all clip-corner-sm"
              >
                <div className={`w-8 h-8 bg-ny-float border border-ny-border flex items-center justify-center ${a.color === 'ny-pink' ? 'text-ny-pink' : a.color === 'ny-cyan' ? 'text-ny-cyan' : a.color === 'ny-purple' ? 'text-ny-purple' : 'text-ny-green'}`}
                ><Icon name="bot" size={16}/></div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-ny-text truncate font-display text-[11px]">{a.name.toUpperCase()}</div>
                  <div className="text-[10px] text-ny-muted truncate">{a.role} · {a.model}</div>
                </div>
                <Icon name="more" size={14} className="text-ny-muted opacity-0 group-hover:opacity-100"/>
              </div>
            ))}
          </div>
        </aside>
      );
    }

    function Canvas({ selected, onSelect }) {
      const nodes = [
        { id: 'n1', agent: AGENTS[0], x: 100, y: 80 },
        { id: 'n2', agent: AGENTS[1], x: 340, y: 80 },
        { id: 'n3', agent: AGENTS[2], x: 340, y: 220 },
        { id: 'n4', agent: AGENTS[3], x: 340, y: 360 },
        { id: 'n5', agent: AGENTS[4], x: 600, y: 220 }
      ];
      return (
        <div className="flex-1 relative overflow-hidden crt-grid"
        >
          <div className="scanline" style={{ animationDelay: '3s' }} />
          <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 1 }}>
            <defs>
              <linearGradient id="edgeNeon" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stopColor="#FF006E" stopOpacity="0.9"/>
                <stop offset="100%" stopColor="#00F0FF" stopOpacity="0.9"/>
              </linearGradient>
              <marker id="arrowNeon" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#00F0FF" />
              </marker>
            </defs>
            {[
              'M 236 124 C 290 124, 290 124, 340 124',
              'M 236 124 C 290 80, 290 152, 340 152',
              'M 236 124 C 290 80, 290 292, 340 292',
              'M 236 124 C 290 80, 290 388, 340 388',
              'M 496 152 C 550 152, 550 236, 600 236',
              'M 496 236 C 550 236, 550 236, 600 236',
              'M 496 388 C 550 388, 550 236, 600 236'
            ].map((d, i) => (
              <path key={i} d={d} stroke="url(#edgeNeon)" strokeWidth="2" fill="none" markerEnd="url(#arrowNeon)" filter="drop-shadow(0 0 3px rgba(0,240,255,0.5))"/>
            ))}
          </svg>

          <div className="absolute left-[300px] top-[130px] w-[260px] h-[300px] border border-dashed border-ny-pink/50 parallel-box pointer-events-none" style={{ zIndex: 0 }}
          >
            <div className="absolute -top-3 left-4 px-2 py-0.5 bg-ny-surface border border-ny-pink text-[10px] text-ny-pink font-display tracking-wider">
              PARALLEL // 并行
            </div>
          </div>

          {nodes.map(n => (
            <div
              key={n.id}
              onClick={() => onSelect(n.id)}
              className={`absolute w-44 border cursor-pointer transition-all clip-corner ${selected === n.id ? 'node-selected bg-ny-float border-ny-pink' : 'bg-ny-surface border-ny-border hover:border-ny-cyan'}`}
              style={{ left: n.x, top: n.y, zIndex: 2 }}
            >
              <div className="flex items-center gap-2 p-3 border-b border-ny-border/50"
003e
                <div className={`w-7 h-7 bg-ny-float border border-ny-border flex items-center justify-center ${n.agent.color === 'ny-pink' ? 'text-ny-pink shadow-[0_0_8px_rgba(255,0,110,0.4)]' : n.agent.color === 'ny-cyan' ? 'text-ny-cyan shadow-[0_0_8px_rgba(0,240,255,0.4)]' : n.agent.color === 'ny-purple' ? 'text-ny-purple shadow-[0_0_8px_rgba(179,103,255,0.4)]' : 'text-ny-green shadow-[0_0_8px_rgba(0,255,136,0.4)]'}`}
                ><Icon name="bot" size={15}/></div>
                <div className="flex-1 min-w-0">
                  <div className="text-[11px] font-display text-ny-text truncate tracking-wider">{n.agent.name.toUpperCase()}</div>
                  <div className="text-[10px] text-ny-muted truncate">{n.agent.model}</div>
                </div>
              </div>
              <div className="px-3 py-2 text-[10px] text-ny-muted truncate">{n.agent.role}</div>
              <div className="absolute -right-1.5 top-1/2 -translate-y-1/2 w-3 h-3 bg-ny-pink border-2 border-ny-bg"/>
              <div className="absolute -left-1.5 top-1/2 -translate-y-1/2 w-3 h-3 bg-ny-cyan border-2 border-ny-bg"/>
            </div>
          ))}

          <div className="absolute bottom-4 right-4 w-40 h-28 bg-ny-surface/95 border border-ny-border overflow-hidden shadow-lg"
          >
            <div className="absolute inset-0 crt-grid opacity-50"/>
            {nodes.map(n => (
              <div
                key={n.id}
                className={`absolute w-4 h-3 ${selected === n.id ? 'bg-ny-pink shadow-[0_0_6px_#FF006E]' : 'bg-ny-border'}`}
                style={{ left: n.x * 0.18 + 8, top: n.y * 0.12 + 6 }}
              />
            ))}
            <div className="absolute inset-0 border-2 border-ny-pink/30"/>
          </div>
        </div>
      );
    }

    function PropertyPanel({ selected }) {
      const node = selected ? AGENTS[parseInt(selected.replace('n','')) - 1] : null;
      return (
        <aside className="w-72 bg-ny-surface border-l border-ny-border flex flex-col shrink-0 relative">
          <div className="scanline" style={{ animationDelay: '2s' }} />
          <div className="p-4 border-b border-ny-border">
            <span className="text-[10px] font-display text-ny-muted tracking-widest">PROPERTIES</span>
          </div>
          {node ? (
            <div className="flex-1 overflow-y-auto p-4 space-y-4">
              <div className="space-y-1.5">
                <label className="text-[10px] text-ny-muted font-display">AGENT</label>
                <select className="w-full bg-ny-bg border border-ny-border px-3 py-2 text-sm text-ny-text focus:border-ny-pink outline-none clip-corner-sm"
                >
                  <option>{node.name}</option>
                  {AGENTS.filter(a => a.id !== node.id).map(a => <option key={a.id}>{a.name}</option>)}
                </select>
              </div>
              <div className="space-y-1.5">
                <label className="text-[10px] text-ny-muted font-display">STEP NAME</label>
                <input type="text" defaultValue={node.role} className="w-full bg-ny-bg border border-ny-border px-3 py-2 text-sm text-ny-text focus:border-ny-pink outline-none clip-corner-sm"/>
              </div>
              <div className="space-y-1.5">
                <label className="text-[10px] text-ny-muted font-display">MODEL OVERRIDE</label>
                <select className="w-full bg-ny-bg border border-ny-border px-3 py-2 text-sm text-ny-text focus:border-ny-pink outline-none clip-corner-sm"
                >
                  <option>{node.model}</option>
                  <option>USE AGENT DEFAULT</option>
                </select>
              </div>
              <div className="pt-4 border-t border-ny-border space-y-3">
                <span className="text-[10px] font-display text-ny-muted tracking-widest">STEP RULES</span>
                {['On Error', 'On Done'].map(label => (
                  <div key={label} className="space-y-1.5">
                    <label className="text-[10px] text-ny-muted font-display">{label}</label>
                    <select className="w-full bg-ny-bg border border-ny-border px-3 py-2 text-sm text-ny-text outline-none focus:border-ny-pink clip-corner-sm"
                    >
                      <option>{label === 'On Error' ? 'STOP' : 'CONTINUE'}</option>
                      <option>RETRY 3X</option>
                      <option>SKIP</option>
                    </select>
                  </div>
                ))}
                <div className="flex items-center justify-between py-2">
                  <span className="text-sm text-ny-text">需要用户输入</span>
                  <button className="w-9 h-5 bg-ny-pink relative clip-corner-sm"
                  >
                    <span className="absolute right-0.5 top-0.5 w-4 h-4 bg-ny-surface shadow"/>
                  </button>
                </div>
                <div className="space-y-1.5">
                  <label className="text-[10px] text-ny-muted font-display">BUDGET CAP (USD)</label>
                  <input type="number" defaultValue="0.50" className="w-full bg-ny-bg border border-ny-border px-3 py-2 text-sm text-ny-text outline-none focus:border-ny-pink clip-corner-sm"/>
                </div>
              </div>
              <div className="pt-4 border-t border-ny-border">
                <span className="text-[10px] font-display text-ny-muted tracking-widest block mb-2">PROMPT TEMPLATE</span>
                <textarea
                  className="w-full h-32 bg-ny-bg border border-ny-border px-3 py-2 text-xs text-ny-text font-mono outline-none focus:border-ny-pink resize-none clip-corner-sm"
                  defaultValue={`你正在执行 ${node.role} 步骤。\n\n上下文：\n{{memory}}\n\n请输出...`}
                />
              </div>
            </div>
          ) : (
            <div className="flex-1 flex flex-col items-center justify-center text-ny-muted p-6 text-center">
              <Icon name="workflow" size={32} className="mb-3 opacity-40"/>
              <p className="text-sm">选择一个节点以编辑属性</p>
            </div>
          )}
        </aside>
      );
    }

    function ModeRail() {
      const modes = [
        { id: 'workflow', icon: 'workflow' },
        { id: 'templates', icon: 'gitBranch', active: true },
        { id: 'agents', icon: 'bot' },
        { id: 'single', icon: 'workflow' },
        { id: 'settings', icon: 'settings' }
      ];
      return (
        <nav className="w-16 h-full bg-ny-surface border-r border-ny-border flex flex-col items-center py-5 shrink-0">
          <div className="w-9 h-9 bg-ny-bg border border-ny-pink flex items-center justify-center text-[10px] font-display text-ny-pink mb-6 clip-corner-sm animate-pulse"
          >NY</div>
          <div className="flex-1 flex flex-col gap-2 w-full px-2">
            {modes.map(m => (
              <button key={m.id} className={`w-full aspect-square flex items-center justify-center transition-all clip-corner-sm ${m.active ? 'text-ny-pink bg-ny-pink/10 border-r-2 border-ny-pink shadow-[0_0_15px_rgba(255,0,110,0.2)]' : 'text-ny-muted hover:text-ny-text hover:bg-ny-float'}`}
              >
                <Icon name={m.icon} size={20}/>
              </button>
            ))}
          </div>
        </nav>
      );
    }

    function App() {
      const [selected, setSelected] = useState('n2');
      return (
        <div className="h-screen w-screen flex flex-col bg-ny-bg">
          <Header />
          <div className="flex-1 flex overflow-hidden">
            <ModeRail />
            <AgentSidebar />
            <Canvas selected={selected} onSelect={setSelected} />
            <PropertyPanel selected={selected} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
